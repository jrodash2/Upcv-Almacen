{% extends 'almacen/base.html' %}
{% block content %}
<div class="page-body">
  <div class="container-fluid">
    <div class="page-title"><div class="row"><div class="col-6"><h4 class="mb-0">Rechazar Solicitud</h4></div><div class="col-6"><ol class="breadcrumb"><li class="breadcrumb-item">Solicitudes</li><li class="breadcrumb-item active">Rechazar #{{ solicitud.id }}</li></ol></div></div></div>
  </div>
  <div class="container-fluid">
    <div class="row justify-content-center"><div class="col-xl-8 col-lg-9 col-md-10">
      <div class="card shadow-sm border-0">
        <div class="card-header bg-danger text-white"><h5 class="mb-0">Motivo de rechazo - Solicitud #{{ solicitud.id }}</h5></div>
        <div class="card-body">
          <form method="post">{% csrf_token %}
            <div class="mb-3">
              <label class="form-label fw-semibold" for="motivo_rechazo">Motivo de rechazo</label>
              <textarea name="motivo_rechazo" id="motivo_rechazo" class="form-control" rows="4" required placeholder="Ingrese el motivo del rechazo"></textarea>
            </div>
            <div class="d-flex justify-content-end gap-2 mt-4">
              <a href="{% url 'almacen:detalle_solicitud_requerimiento' solicitud_id=solicitud.id %}" class="btn btn-light border">Cancelar</a>
              <button class="btn btn-danger" type="submit">Rechazar Solicitud</button>
            </div>
          </form>
        </div>
      </div>
    </div></div>
  </div>
</div>
{% endblock %}
